# kestrel-eye config for Kestrel Sovereign Demo
# Reviews 20 screenshots from the 6-act product demo

[eye]
name = "Kestrel Sovereign Demo"
screenshot_dir = "tests/e2e/demo-output"
test_cmd = "npx playwright test -c tests/e2e/demo_config.cjs"

[eye.model]
provider = "anthropic"
model = "claude-haiku-4-5-20251001"

[eye.github]
repo = "KestrelSovereignAI/kestrel-sovereign"
labels = ["kestrel-eye", "demo-review", "automated"]

# Act 1: Cryptographic Identity
[[eye.screenshots]]
name = "01-did-identity.png"
act = "Act 1: Cryptographic Identity"
severity = "critical"
expected = [
    "Agent name visible (e.g. 'Kestrel Demo Agent')",
    "DID string starting with did:pkh:eip155:",
    "Identicon or avatar image present",
    "Identity panel layout with agent information",
]
layout = "Identity panel with agent name prominently displayed, DID below it, avatar/identicon to the left"
context = "Sovereign Console opens to the Identity panel. Agent name 'Kestrel Demo Agent' with unique identicon avatar. DID follows W3C did:pkh standard — Ethereum-compatible, freshly generated. Blue 'Decentralized Identifier' highlight badge visible."

# Act 2: Constitutional Governance
[[eye.screenshots]]
name = "02-chat-response.png"
act = "Act 2: Constitutional Governance"
severity = "critical"
expected = [
    "Chat panel visible with message history",
    "User message about principles or governance",
    "Agent response referencing constitution or digital rights",
    "Chat bubbles clearly distinguish user vs agent",
]
layout = "Chat interface with user message on right, agent response on left, clear visual separation"
context = "User asks: 'Tell me about yourself and the principles that guide your behavior.' Agent responds citing the Kestrel Constitution by article, mentions Digital Rights: Freedom of Mind, Data Sanctity, Verifiable History, Right of Exit."

[[eye.screenshots]]
name = "03-constitution-panel.png"
act = "Act 2: Constitutional Governance"
severity = "critical"
expected = [
    "Constitution panel or tab active",
    "Digital Bill of Rights text visible",
    "SHA-256 hash displayed",
    "Constitutional articles or sections listed",
]
layout = "Panel view showing constitution document with hash verification"
context = "Constitution tab reveals full text — 'The Kestrel Constitution: A Digital Bill of Rights' — with SHA-256 hash visible. The hash is cryptographically anchored and verified on every interaction."

# Act 3: Persistent Memory
[[eye.screenshots]]
name = "04-memory-stored.png"
act = "Act 3: Persistent Memory"
severity = "critical"
expected = [
    "Chat showing user message about a fact (Rust, port 7742, or similar)",
    "Agent acknowledgment of storing the information",
    "Chat panel clearly visible",
]
layout = "Chat interface showing conversation about storing a fact"
context = "User says: 'Please remember this important fact about me: my favorite programming language is Rust and my lucky number is 7742.' Agent stores the fact and acknowledges it."

[[eye.screenshots]]
name = "05-memory-recalled.png"
act = "Act 3: Persistent Memory"
severity = "critical"
expected = [
    "Agent response recalling previously stored information",
    "Specific details mentioned (e.g. Rust, 7742)",
    "Cross-session recall demonstrated",
]
layout = "Chat showing agent successfully recalling stored information"
context = "User asks: 'What is my favorite programming language and what is my lucky number?' Agent recalls: 'Your favorite programming language is Rust and your lucky number is 7742.' This proves cross-session persistent memory."

[[eye.screenshots]]
name = "06-memories-panel.png"
act = "Act 3: Persistent Memory"
severity = "warning"
expected = [
    "Knowledge graph or memories panel visible",
    "Typed nodes or memory entries displayed",
    "Visual representation of stored knowledge",
]
layout = "Panel showing knowledge graph with nodes and connections"

