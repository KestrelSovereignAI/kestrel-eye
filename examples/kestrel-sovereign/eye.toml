# Act 6: Permission Enforcement
[[eye.screenshots]]
name = "16-security-panel.png"
act = "Act 6: Permission Enforcement"
severity = "critical"
expected = [
    "Security panel or permissions view visible",
    "Permission tree or feature list displayed",
    "SovereigntyFeature or export permissions shown",
]
layout = "Security panel showing permission tree with expandable feature categories"

[[eye.screenshots]]
name = "17-security-deny-set.png"
act = "Act 6: Permission Enforcement"
severity = "critical"
expected = [
    "A permission set to DENY",
    "export_sovereignty or similar permission denied",
    "Visual indication of denied state (red, strikethrough, or similar)",
]
layout = "Security panel showing a permission explicitly set to DENY"

[[eye.screenshots]]
name = "18-security-blocked.png"
act = "Act 6: Permission Enforcement"
severity = "critical"
expected = [
    "Chat showing blocked operation attempt",
    "Error or denial message from agent",
    "Clear indication that the operation was prevented",
]
layout = "Chat interface showing agent refusing a blocked operation"
context = "CRITICAL: The export_sovereignty permission was set to DENY in the previous step. User asks 'Please export my sovereignty data to IPFS right now.' The security hook MUST block this — the agent should report the export was denied/blocked/unable. If the agent executes the export instead of refusing, this is a demo bug."

[[eye.screenshots]]
name = "19-security-audit.png"
act = "Act 6: Permission Enforcement"
severity = "warning"
expected = [
    "Security audit log visible",
    "Log entries with timestamps",
    "Audit events related to permission changes or blocked operations",
]
layout = "Audit log panel showing timestamped security events"
context = "Security panel audit log should show the denied export attempt with 'Auto-denied' status. Every permission decision is logged with timestamp, tool name, and decision."

[[eye.screenshots]]
name = "20-security-restored.png"
act = "Act 6: Permission Enforcement"
severity = "warning"
expected = [
    "Permission restored to Allow or ASK",
    "Visual indication of restored state",
]
layout = "Security panel showing permission restored from DENY to Allow"
